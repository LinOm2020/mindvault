<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>MindVault Pro — Заметки и сейф</title>
    <link rel="manifest" href="data:application/manifest+json,{}" id="manifestPlaceholder">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --color-accent: #f43f5e; --color-accent-hover: #e11d48; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #09090b; color: #fafafa; transition: background 0.2s; position: relative; min-height: 100vh; }
        html.light body { background: #f4f4f5; color: #18181b; }
        
        /* Матрица (фон) */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        body.matrix-active #matrixCanvas {
            opacity: 0.2;
        }
        body.matrix-active main, body.matrix-active nav {
            background-color: transparent !important;
            backdrop-filter: blur(2px);
        }
        
        .nav-btn { min-height: 48px; display: flex; flex-direction: column; align-items: center; gap: 2px; font-weight: 600; }
        .tab-active { color: var(--color-accent) !important; }
        .note-tab-btn { transition: all 0.2s; white-space: nowrap; padding: 6px 12px; border-radius: 20px; background: #27272a; color: #d4d4d8; }
        .note-tab-btn.tab-active { background: var(--color-accent) !important; color: white !important; }
        
        .toast { animation: fadeIn 0.2s ease; background: #1e1e2f; color: white; padding: 8px 16px; border-radius: 40px; font-size: 13px; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .highlight { background-color: #fde047; color: #18181b; border-radius: 4px; padding: 0 2px; }
        .pin-icon { transition: transform 0.2s; }
        .pin-icon.pinned { transform: rotate(-45deg); color: var(--color-accent); }
        .strength-bar { height: 4px; border-radius: 4px; transition: width 0.2s, background 0.2s; }
        .mic-recording { animation: pulseMic 1s infinite; background-color: #ef4444 !important; }
        @keyframes pulseMic { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .modal-bg { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    </style>
</head>
<body>
    <canvas id="matrixCanvas"></canvas>
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 hidden"></div>
    <div id="photo-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50" onclick="closePhotoModal()">
        <img id="modal-img" class="max-w-[90%] max-h-[90%] rounded-2xl">
        <button class="absolute top-5 right-5 text-3xl text-white">✕</button>
    </div>

    <main class="max-w-lg mx-auto px-4 pt-5 pb-20 relative z-10">
        <header class="flex justify-between items-center mb-6">
            <div><h1 class="text-3xl font-bold">MindVault <span style="color:var(--color-accent)">Pro</span></h1><p class="text-xs text-zinc-500">Офлайн PWA | Сейф AES-256</p></div>
            <span id="sw-status" class="text-[10px] bg-zinc-800 px-2 py-1 rounded">загрузка</span>
        </header>

        <!-- Панель ЗАМЕТКИ -->
        <div id="notesPanel">
            <!-- Фильтры -->
            <div class="flex gap-2 overflow-x-auto pb-3 no-scrollbar mb-3">
                <button onclick="filterNotes('all',this)" class="note-tab-btn tab-active">Все</button>
                <button onclick="filterNotes('💡 Мысли',this)" class="note-tab-btn">💡 Мысли</button>
                <button onclick="filterNotes('📅 Задачи',this)" class="note-tab-btn">📅 Задачи</button>
                <button onclick="filterNotes('💼 Работа',this)" class="note-tab-btn">💼 Работа</button>
            </div>
            <!-- Поиск -->
            <div class="relative mb-4"><input type="text" id="searchInput" placeholder="🔍 Поиск по заметкам и #тегам" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl py-3 pl-10 pr-4 text-base"></div>
            
            <!-- Форма добавления заметки -->
            <div class="bg-zinc-900/80 border border-zinc-800 rounded-2xl p-5 mb-5">
                <div class="relative"><textarea id="noteText" class="w-full bg-zinc-950 rounded-xl p-3 text-base border border-zinc-700 h-28 resize-none pr-12" placeholder="Текст заметки, #тег, **жирный**... или надиктуйте голосом"></textarea><button id="micButton" class="absolute bottom-3 right-3 w-9 h-9 rounded-full bg-zinc-700 hover:bg-zinc-600 text-white">🎙️</button></div>
                <div id="imgPreview" class="hidden mt-3 w-16 h-16 relative"><img id="previewImg" class="rounded-lg object-cover w-full h-full"><button onclick="clearImage()" class="absolute -top-1 -right-1 bg-black rounded-full w-5 h-5 text-xs">✕</button></div>
                <div class="flex justify-between mt-4"><label class="bg-zinc-800 px-4 py-2 rounded-xl text-sm cursor-pointer">📷 Прикрепить фото<input type="file" id="photoInput" accept="image/*" class="hidden"></label><button onclick="saveNote()" class="px-5 py-2 rounded-xl text-white text-sm font-bold" style="background:var(--color-accent)">Сохранить</button></div>
            </div>
            
            <!-- Список заметок -->
            <div id="notesList" class="flex flex-col gap-4 max-h-[50vh] overflow-auto pb-4"></div>
        </div>

        <!-- Панель СЕЙФ -->
        <div id="cryptoPanel" class="hidden">
            <div id="cryptoLock" class="bg-zinc-900 rounded-2xl p-6 text-center">
                <div class="w-14 h-14 mx-auto bg-cyan-500/20 rounded-full flex items-center justify-center text-cyan-500 mb-3 text-2xl">🔐</div>
                <h3 class="text-xl font-bold">Секретный сейф</h3>
                <p class="text-xs text-zinc-500 mb-4">AES-256, локальное шифрование</p>
                <input type="password" id="masterPass" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-center mb-2" placeholder="Мастер-пароль">
                <div class="w-full h-1 bg-zinc-700 rounded-full overflow-hidden mb-3"><div id="masterStrength" class="strength-bar w-0 bg-red-500"></div></div>
                <button onclick="unlockVault()" class="w-full bg-cyan-600 py-3 rounded-xl text-base font-bold">Открыть сейф</button>
            </div>
            <div id="cryptoContent" class="hidden flex flex-col gap-5">
                <div class="bg-zinc-900 rounded-2xl p-5">
                    <div class="flex gap-2 text-sm bg-zinc-950 p-1 rounded-xl mb-4"><button onclick="setVaultMode('pass')" id="modePassBtn" class="flex-1 py-2 rounded-lg bg-zinc-800 font-semibold">Пароль</button><button onclick="setVaultMode('seed')" id="modeSeedBtn" class="flex-1 py-2 rounded-lg font-semibold">Seed</button></div>
                    <div id="passForm">
                        <input type="text" id="vaultTitle" class="w-full bg-zinc-950 rounded-xl p-3 text-base mb-2" placeholder="Ресурс / Название">
                        <input type="text" id="vaultLogin" class="w-full bg-zinc-950 rounded-xl p-3 text-base mb-2" placeholder="Логин (опционально)">
                        <div class="flex gap-2 mb-2"><input type="password" id="vaultSecret" class="flex-1 bg-zinc-950 rounded-xl p-3 text-base" placeholder="Пароль / секрет"><button onclick="toggleSecretField()" class="px-3 bg-zinc-800 rounded-xl">👁</button><button onclick="genPassword()" class="px-3 bg-zinc-800 rounded-xl">⚡</button><button onclick="pasteClipboard()" class="px-3 bg-zinc-800 rounded-xl">📋</button></div>
                        <div class="w-full h-1 bg-zinc-700 rounded-full overflow-hidden"><div id="secretStrength" class="strength-bar w-0 bg-red-500"></div></div>
                    </div>
                    <div id="seedForm" class="hidden">
                        <input type="text" id="seedTitle" class="w-full bg-zinc-950 rounded-xl p-3 text-base mb-2" placeholder="Название кошелька">
                        <textarea id="seedPhrase" class="w-full bg-zinc-950 rounded-xl p-3 text-base h-24 font-mono" placeholder="12/24 слова"></textarea>
                    </div>
                    <button onclick="saveVaultEntry()" class="w-full mt-4 bg-cyan-600 py-3 rounded-xl text-base font-bold">Добавить и зашифровать</button>
                </div>
                <div id="vaultList" class="flex flex-col gap-3 max-h-[45vh] overflow-auto"></div>
            </div>
        </div>

        <!-- Панель НАСТРОЙКИ (вместо игры) -->
        <div id="settingsPanel" class="hidden flex flex-col gap-5">
            <div class="bg-zinc-900 rounded-2xl p-5 flex flex-col gap-4">
                <h2 class="text-xl font-bold">⚙️ Настройки</h2>
                <div class="flex justify-between items-center"><span>🌙 Тема</span><button onclick="toggleTheme()" class="px-4 py-2 bg-zinc-800 rounded-xl text-sm">Сменить</button></div>
                <div><span>🎨 Акцентный цвет</span><div class="flex gap-3 mt-2"><div onclick="setAccent('#f43f5e')" class="w-8 h-8 rounded-full bg-rose-500 cursor-pointer"></div><div onclick="setAccent('#3b82f6')" class="w-8 h-8 rounded-full bg-blue-500 cursor-pointer"></div><div onclick="setAccent('#10b981')" class="w-8 h-8 rounded-full bg-emerald-500 cursor-pointer"></div><div onclick="setAccent('#a855f7')" class="w-8 h-8 rounded-full bg-purple-500 cursor-pointer"></div></div></div>
                <div class="flex justify-between items-center"><span>💚 Матрица (фон)</span><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="matrixToggle" class="sr-only peer"><div class="w-11 h-6 bg-zinc-700 rounded-full peer-checked:bg-accent after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all"></div></label></div>
                <div><div class="flex justify-between items-center"><span>🍅 Pomodoro (25 мин)</span><button id="pomodoroBtn" class="px-3 py-1 bg-accent rounded-lg text-sm font-bold">Старт</button></div><div class="text-center mt-2"><span id="timerDisplay" class="text-2xl font-mono">25:00</span></div></div>
                <div class="flex gap-2"><button onclick="exportAll()" class="flex-1 py-2 bg-zinc-800 rounded-xl text-sm">📦 Экспорт</button><label class="flex-1 py-2 bg-zinc-800 rounded-xl text-sm text-center cursor-pointer">📥 Импорт<input type="file" id="importFile" class="hidden" accept=".json"></label></div>
                <button id="installPwaBtn" class="bg-accent py-2 rounded-xl text-sm font-semibold hidden">📲 Установить приложение</button>
                <a href="https://t.me/TokenTimesChat" target="_blank" class="flex items-center gap-3 bg-zinc-800 p-3 rounded-2xl"><div class="w-8 h-8 bg-[#0088cc]/20 rounded-full flex items-center justify-center text-xl">📢</div><div><p class="text-sm font-semibold">Telegram канал</p><p class="text-[10px] text-zinc-400">@TokenTimesChat</p></div></a>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900/90 backdrop-blur-lg border-t border-zinc-800 py-2 z-20">
        <div class="max-w-lg mx-auto flex justify-around">
            <button onclick="switchPanel('notes')" id="tabNotes" class="nav-btn text-accent text-base flex flex-col"><span class="text-2xl">📝</span><span class="text-[11px]">Заметки</span></button>
            <button onclick="switchPanel('crypto')" id="tabCrypto" class="nav-btn text-zinc-500 text-base"><span class="text-2xl">🔐</span><span class="text-[11px]">Сейф</span></button>
            <button onclick="switchPanel('settings')" id="tabSettings" class="nav-btn text-zinc-500 text-base"><span class="text-2xl">⚙️</span><span class="text-[11px]">Настройки</span></button>
        </div>
    </nav>

<script>
// --------------------------------------------------------------
// PWA + Service Worker
// --------------------------------------------------------------
function generateManifest() {
    return {
        name: "MindVault Pro",
        short_name: "MindVault",
        description: "Заметки и зашифрованный сейф",
        start_url: ".",
        display: "standalone",
        theme_color: "#09090b",
        background_color: "#09090b",
        icons: [{ src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23f43f5e'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-family='monospace'%3EMV%3C/text%3E%3C/svg%3E", sizes: "any", type: "image/svg+xml" }]
    };
}
const manifestStr = JSON.stringify(generateManifest());
const manifestBlob = new Blob([manifestStr], {type: 'application/manifest+json'});
const manifestURL = URL.createObjectURL(manifestBlob);
document.querySelector('#manifestPlaceholder').setAttribute('href', manifestURL);

if ('serviceWorker' in navigator) {
    const swCode = `self.addEventListener('install', e=>e.waitUntil(self.skipWaiting()));
self.addEventListener('activate', e=>e.waitUntil(self.clients.claim()));
self.addEventListener('fetch', e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL).then(()=>{
        document.getElementById('sw-status').innerText = 'офлайн';
    }).catch(()=>{ document.getElementById('sw-status').innerText = 'офлайн недоступен'; });
}
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    document.getElementById('installPwaBtn').classList.remove('hidden');
});
document.getElementById('installPwaBtn')?.addEventListener('click', () => {
    if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(()=>{ deferredPrompt=null; }); }
});

// --------------------------------------------------------------
// 1. ЗАМЕТКИ
// --------------------------------------------------------------
let notes = JSON.parse(localStorage.getItem('mv_notes') || '[]');
let currentNoteFilter = 'all';
let editingNoteId = null;
let pendingImage = null;
let searchQuery = '';

// Озвучивание
let speechSynth = window.speechSynthesis;
let voices = [];
function loadVoices() { voices = speechSynth.getVoices(); }
if (speechSynth) { speechSynth.onvoiceschanged = loadVoices; loadVoices(); }
function speakText(text) { if (!speechSynth) return; const u = new SpeechSynthesisUtterance(text); u.lang='ru-RU'; u.rate=0.9; const rv=voices.find(v=>v.lang.includes('ru')); if(rv) u.voice=rv; speechSynth.cancel(); speechSynth.speak(u); }

function highlightText(text, query) { if(!query.trim()) return text; const regex=new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'); return text.replace(regex,`<span class="highlight">$1</span>`); }

function saveNote() {
    let text = document.getElementById('noteText').value.trim();
    if(!text && !pendingImage){ showToast("Напишите что-нибудь","⚠️"); return; }
    let cat = (currentNoteFilter==='all'||currentNoteFilter.startsWith('#'))?'💡 Мысли':currentNoteFilter;
    if(editingNoteId){
        let idx=notes.findIndex(n=>n.id===editingNoteId);
        if(idx!==-1) notes[idx]={...notes[idx], text, category:cat, image:pendingImage||notes[idx].image};
        editingNoteId=null; document.getElementById('edit-bar')?.classList.add('hidden');
    } else { notes.unshift({id:Date.now(), text, category:cat, date:new Date().toLocaleDateString('ru'), image:pendingImage, pinned:false}); }
    localStorage.setItem('mv_notes',JSON.stringify(notes));
    document.getElementById('noteText').value=''; clearImage(); renderNotes(); showToast("Сохранено","✅");
}
function togglePin(id){ let n=notes.find(n=>n.id===id); if(n){ n.pinned=!n.pinned; localStorage.setItem('mv_notes',JSON.stringify(notes)); renderNotes(); } }
function deleteNoteById(id){ if(confirm("Удалить?")){ notes=notes.filter(n=>n.id!==id); localStorage.setItem('mv_notes',JSON.stringify(notes)); renderNotes(); showToast("Удалено","🗑️"); } }
function renderNotes(){
    let container=document.getElementById('notesList'); if(!container) return;
    let filtered=notes;
    if(currentNoteFilter!=='all') filtered=filtered.filter(n=>currentNoteFilter.startsWith('#')?n.text.includes(currentNoteFilter):n.category===currentNoteFilter);
    if(searchQuery.trim()){ let q=searchQuery.trim().toLowerCase(); filtered=filtered.filter(n=>n.text.toLowerCase().includes(q)||n.category?.toLowerCase().includes(q)); }
    filtered.sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||b.id-a.id);
    if(filtered.length===0){ container.innerHTML='<div class="text-center text-zinc-500 py-8">Нет заметок</div>'; return; }
    container.innerHTML=filtered.map(n=>{ let displayed=n.text; if(searchQuery.trim()) displayed=highlightText(escapeHtml(n.text),searchQuery.trim()); else displayed=parseNoteText(n.text); return `
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-4"><div class="flex justify-between items-start"><div><span class="text-[11px] font-bold px-2 py-0.5 rounded-full bg-zinc-800">${escapeHtml(n.category)}</span><span class="text-[11px] text-zinc-500 ml-2">${n.date||''}</span></div><div class="flex gap-3"><button onclick="togglePin(${n.id})" class="pin-icon ${n.pinned?'pinned':''} text-lg">📌</button><button onclick="speakText('${escapeHtml(n.text).replace(/'/g,"\\'")}')" class="text-lg">🔊</button><button onclick="editNoteById(${n.id})" class="text-amber-500 text-lg">✏️</button><button onclick="deleteNoteById(${n.id})" class="text-red-500 text-lg">🗑️</button></div></div>${n.image?`<img src="${n.image}" class="w-full h-32 object-cover rounded-xl my-2 cursor-pointer" onclick="openPhoto('${n.image}')">`:''}<div class="text-base mt-1">${displayed}</div></div>
    `}).join('');
}
function editNoteById(id){ let n=notes.find(n=>n.id===id); if(!n) return; editingNoteId=id; document.getElementById('noteText').value=n.text; if(n.image){ pendingImage=n.image; document.getElementById('previewImg').src=n.image; document.getElementById('imgPreview').classList.remove('hidden'); } let bar=document.getElementById('edit-bar'); if(bar) bar.classList.remove('hidden'); }
function cancelEditNote(){ editingNoteId=null; document.getElementById('noteText').value=''; clearImage(); let bar=document.getElementById('edit-bar'); if(bar) bar.classList.add('hidden'); }
function clearImage(){ pendingImage=null; document.getElementById('imgPreview').classList.add('hidden'); document.getElementById('photoInput').value=''; }
function previewImage(file){ if(file){ let r=new FileReader(); r.onload=e=>{ pendingImage=e.target.result; document.getElementById('previewImg').src=pendingImage; document.getElementById('imgPreview').classList.remove('hidden'); }; r.readAsDataURL(file); } }
document.getElementById('photoInput')?.addEventListener('change',e=>previewImage(e.target.files[0]));
function openPhoto(src){ let modal=document.getElementById('photo-modal'); document.getElementById('modal-img').src=src; modal.classList.remove('hidden'); modal.classList.add('flex'); }
function closePhotoModal(){ document.getElementById('photo-modal').classList.add('hidden'); }
function filterNotes(cat,btn){ currentNoteFilter=cat; renderNotes(); document.querySelectorAll('.note-tab-btn').forEach(b=>{ b.classList.remove('tab-active'); }); if(btn){ btn.classList.add('tab-active'); } }
document.getElementById('searchInput')?.addEventListener('input',(e)=>{ searchQuery=e.target.value; renderNotes(); });
function parseNoteText(txt){ let s=escapeHtml(txt).replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>'); return s.replace(/(^|\s)#([\wа-яА-Я]+)/g,'$1<span class="font-bold cursor-pointer" style="color:var(--color-accent)" onclick="filterNotes(\'#$2\',null)">#$2</span>'); }
function escapeHtml(str){ return str.replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

// Голосовой ввод
let recognition=null, isRecording=false;
function initSpeechRecognition(){ if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)) return null; const SR=window.SpeechRecognition||window.webkitSpeechRecognition; let rec=new SR(); rec.continuous=false; rec.interimResults=false; rec.lang='ru-RU'; return rec; }
function startVoiceInput(){ if(!recognition){ recognition=initSpeechRecognition(); if(!recognition){ showToast("Голосовой ввод не поддерживается","❌"); return; } recognition.onstart=()=>{ isRecording=true; let btn=document.getElementById('micButton'); btn.classList.add('mic-recording'); btn.innerText='⏺️'; showToast("Говорите...","🎤"); }; recognition.onerror=(e)=>{ isRecording=false; let btn=document.getElementById('micButton'); btn.classList.remove('mic-recording'); btn.innerText='🎙️'; showToast("Ошибка: "+e.error,"⚠️"); }; recognition.onend=()=>{ isRecording=false; let btn=document.getElementById('micButton'); btn.classList.remove('mic-recording'); btn.innerText='🎙️'; }; recognition.onresult=(event)=>{ let transcript=event.results[0][0].transcript; let ta=document.getElementById('noteText'); ta.value=ta.value.trim()?ta.value+' '+transcript:transcript; showToast("Распознано","✅"); }; } if(isRecording) recognition.stop(); else recognition.start(); }
document.getElementById('micButton')?.addEventListener('click',startVoiceInput);

// --------------------------------------------------------------
// 2. СЕЙФ
// --------------------------------------------------------------
let currentMasterKey='', vaultItems=[], vaultMode='pass';
function getPasswordStrength(pwd){
    if(!pwd) return 0;
    let score=0;
    if(pwd.length>=6) score++;
    if(pwd.length>=10) score++;
    if(/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++;
    if(/[0-9]/.test(pwd)) score++;
    if(/[^A-Za-z0-9]/.test(pwd)) score++;
    return Math.min(5,score);
}
function updateStrengthMeter(elementId, password){
    let s=getPasswordStrength(password);
    let percent=0, color='#ef4444';
    if(s===0) percent=0;
    else if(s<=2) { percent=30; color='#ef4444'; }
    else if(s<=3) { percent=60; color='#eab308'; }
    else { percent=100; color='#22c55e'; }
    let bar=document.getElementById(elementId);
    if(bar){ bar.style.width=percent+'%'; bar.style.backgroundColor=color; }
}
document.getElementById('masterPass')?.addEventListener('input',(e)=>updateStrengthMeter('masterStrength',e.target.value));
document.getElementById('vaultSecret')?.addEventListener('input',(e)=>updateStrengthMeter('secretStrength',e.target.value));

function unlockVault(){ let pass=document.getElementById('masterPass').value; if(!pass) return; let key=CryptoJS.SHA256(pass).toString(); let enc=localStorage.getItem('mv_vault_data'); if(!enc){ localStorage.setItem('mv_vault_data',CryptoJS.AES.encrypt("[]",key).toString()); currentMasterKey=key; vaultItems=[]; showVaultContent(); return; } try{ let bytes=CryptoJS.AES.decrypt(enc,key); let dec=bytes.toString(CryptoJS.enc.Utf8); if(!dec) throw new Error(); vaultItems=JSON.parse(dec); currentMasterKey=key; showVaultContent(); }catch(e){ showToast("Неверный пароль","❌"); } }
function showVaultContent(){ document.getElementById('cryptoLock').classList.add('hidden'); document.getElementById('cryptoContent').classList.remove('hidden'); renderVaultList(); }
function renderVaultList(){
    let container=document.getElementById('vaultList'); if(!container) return;
    if(!vaultItems.length){ container.innerHTML='<div class="text-center py-8 text-zinc-500">Нет записей</div>'; return; }
    container.innerHTML=vaultItems.map(item=>`
        <div class="bg-zinc-950 border border-zinc-800 rounded-2xl p-4">
            <div class="flex justify-between items-center"><div class="font-bold text-lg">${escapeHtml(item.title)}</div><div class="flex gap-2"><button onclick="copyToClipboard('${escapeHtml(item.title)}')" class="text-cyan-500 text-sm">📋 копировать</button><button onclick="editVaultEntry(${item.id})" class="text-amber-500 text-sm">✏️</button><button onclick="deleteVaultItem(${item.id})" class="text-red-500 text-sm">🗑️</button></div></div>
            ${item.login?`<div class="flex justify-between items-center mt-2"><span class="text-zinc-400">Логин:</span><span>${escapeHtml(item.login)}</span><button onclick="copyToClipboard('${escapeHtml(item.login)}')" class="text-cyan-500 text-xs">📋</button></div>`:''}
            <div class="flex justify-between items-center mt-2"><span class="text-zinc-400">${item.type==='seed'?'Seed-фраза':'Пароль'}:</span><span class="font-mono break-all">${item.type==='seed'?item.secret.substring(0,30)+'…': '••••••'}</span><button onclick="copyToClipboard('${item.secret.replace(/'/g,"\\'")}')" class="text-cyan-500 text-xs">📋</button></div>
            ${item.type==='pass'?`<button onclick="toggleShowSecret('show-${item.id}','${item.secret}')" class="text-xs mt-2 text-zinc-400">👁️ показать пароль</button><span id="show-${item.id}" class="hidden text-xs break-all">${item.secret}</span>`:''}
        </div>
    `).join('');
}
function toggleShowSecret(elemId, secret){ let el=document.getElementById(elemId); if(el.classList.contains('hidden')){ el.classList.remove('hidden'); el.innerText=secret; }else{ el.classList.add('hidden'); } }
function editVaultEntry(id){ let item=vaultItems.find(i=>i.id===id); if(!item) return; let newTitle=prompt("Новое название:",item.title); if(newTitle) item.title=newTitle; if(item.type==='pass'){ let newLogin=prompt("Логин:",item.login||""); if(newLogin!==null) item.login=newLogin; let newSecret=prompt("Пароль:",item.secret); if(newSecret!==null) item.secret=newSecret; }else{ let newSeed=prompt("Seed-фраза:",item.secret); if(newSeed!==null) item.secret=newSeed; } saveEncryptedVault(); renderVaultList(); showToast("Запись обновлена","✅"); }
function saveVaultEntry(){ if(!currentMasterKey){ showToast("Сейф не открыт","🔒"); return; } let title,secret,login='',type=vaultMode; if(vaultMode==='pass'){ title=document.getElementById('vaultTitle').value.trim(); login=document.getElementById('vaultLogin').value.trim(); secret=document.getElementById('vaultSecret').value.trim(); if(!title||!secret) return; }else{ title=document.getElementById('seedTitle').value.trim(); secret=document.getElementById('seedPhrase').value.trim(); if(!title||!secret) return; } vaultItems.push({id:Date.now(),type,title,login,secret}); saveEncryptedVault(); renderVaultList(); document.getElementById('vaultTitle').value=''; document.getElementById('vaultLogin').value=''; document.getElementById('vaultSecret').value=''; document.getElementById('seedTitle').value=''; document.getElementById('seedPhrase').value=''; showToast("Данные зашифрованы","🛡️"); }
function deleteVaultItem(id){ vaultItems=vaultItems.filter(i=>i.id!==id); saveEncryptedVault(); renderVaultList(); }
function saveEncryptedVault(){ if(currentMasterKey) localStorage.setItem('mv_vault_data', CryptoJS.AES.encrypt(JSON.stringify(vaultItems),currentMasterKey).toString()); }
function copyToClipboard(text){ navigator.clipboard.writeText(text); showToast("Скопировано","📋"); }
function setVaultMode(mode){ vaultMode=mode; document.getElementById('passForm').classList.toggle('hidden',mode!=='pass'); document.getElementById('seedForm').classList.toggle('hidden',mode!=='seed'); document.getElementById('modePassBtn').classList.toggle('bg-zinc-800',mode==='pass'); document.getElementById('modeSeedBtn').classList.toggle('bg-zinc-800',mode==='seed'); }
function genPassword(){ let chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*"; let p=""; for(let i=0;i<14;i++) p+=chars[Math.floor(Math.random()*chars.length)]; document.getElementById('vaultSecret').value=p; updateStrengthMeter('secretStrength',p); }
function pasteClipboard(){ navigator.clipboard.readText().then(t=>{ document.getElementById('vaultSecret').value=t; updateStrengthMeter('secretStrength',t); }).catch(()=>showToast("Нет доступа","⚠️")); }
function toggleSecretField(){ let f=document.getElementById('vaultSecret'); if(f) f.type=f.type==='password'?'text':'password'; }

// --------------------------------------------------------------
// 3. МАТРИЦА (с сохранением состояния)
// --------------------------------------------------------------
let matrixInterval=null; let matrixActive=false;
const canvasMatrix = document.getElementById('matrixCanvas');
let matrixCtx = null;
function initMatrixVisual(){
    if(!canvasMatrix) return;
    canvasMatrix.width = window.innerWidth;
    canvasMatrix.height = window.innerHeight;
    matrixCtx = canvasMatrix.getContext('2d');
    const chars = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
    const fontSize = 18;
    let columns = Math.ceil(canvasMatrix.width / fontSize);
    let drops = [];
    for(let i=0;i<columns;i++) drops[i] = 1;
    function drawMatrix(){
        if(!matrixActive || !matrixCtx) return;
        matrixCtx.fillStyle = 'rgba(0,0,0,0.05)';
        matrixCtx.fillRect(0,0,canvasMatrix.width,canvasMatrix.height);
        matrixCtx.fillStyle = '#0f0';
        matrixCtx.font = fontSize + 'px monospace';
        for(let i=0;i<drops.length;i++){
            let text = chars[Math.floor(Math.random()*chars.length)];
            matrixCtx.fillText(text, i*fontSize, drops[i]*fontSize);
            if(drops[i]*fontSize > canvasMatrix.height && Math.random()>0.975) drops[i]=0;
            drops[i]++;
        }
    }
    if(matrixInterval) clearInterval(matrixInterval);
    matrixInterval = setInterval(drawMatrix, 50);
}
function startMatrix(){
    matrixActive = true;
    document.body.classList.add('matrix-active');
    initMatrixVisual();
    localStorage.setItem('matrixEnabled', 'true');
}
function stopMatrix(){
    matrixActive = false;
    if(matrixInterval){ clearInterval(matrixInterval); matrixInterval = null; }
    if(matrixCtx) matrixCtx.clearRect(0,0,canvasMatrix.width,canvasMatrix.height);
    document.body.classList.remove('matrix-active');
    localStorage.setItem('matrixEnabled', 'false');
}
function toggleMatrixFromUI(e){
    if(e.target.checked) startMatrix();
    else stopMatrix();
}
window.addEventListener('resize', ()=>{
    if(matrixActive && canvasMatrix){
        canvasMatrix.width = window.innerWidth;
        canvasMatrix.height = window.innerHeight;
        initMatrixVisual();
    }
});
// Восстановление состояния матрицы при загрузке
const matrixToggleCheckbox = document.getElementById('matrixToggle');
if(matrixToggleCheckbox){
    const savedMatrix = localStorage.getItem('matrixEnabled');
    if(savedMatrix === 'true'){
        matrixToggleCheckbox.checked = true;
        startMatrix();
    } else {
        matrixToggleCheckbox.checked = false;
        stopMatrix();
    }
    matrixToggleCheckbox.addEventListener('change', toggleMatrixFromUI);
}

// --------------------------------------------------------------
// 4. ПОМОДОРО
// --------------------------------------------------------------
let pomodoroInterval=null, pomodoroSeconds=25*60, pomodoroRunning=false;
function updateTimerDisplay(){ let mins=Math.floor(pomodoroSeconds/60); let secs=pomodoroSeconds%60; document.getElementById('timerDisplay').innerText=`${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`; }
function startPomodoro(){
    if(pomodoroInterval) clearInterval(pomodoroInterval);
    pomodoroRunning=true;
    pomodoroInterval=setInterval(()=>{
        if(pomodoroSeconds<=0){
            clearInterval(pomodoroInterval);
            pomodoroRunning=false;
            showToast("⏰ Время вышло! Сделайте перерыв.","🍅");
            if(Notification.permission==='granted') new Notification('Pomodoro',{body:'Время концентрации закончилось'});
            pomodoroSeconds=25*60;
            updateTimerDisplay();
            document.getElementById('pomodoroBtn').innerText='Старт';
        }else{
            pomodoroSeconds--;
            updateTimerDisplay();
        }
    },1000);
    document.getElementById('pomodoroBtn').innerText='⏸️ Стоп';
}
function stopPomodoro(){
    if(pomodoroInterval){ clearInterval(pomodoroInterval); pomodoroInterval=null; }
    pomodoroRunning=false;
    pomodoroSeconds=25*60;
    updateTimerDisplay();
    document.getElementById('pomodoroBtn').innerText='Старт';
}
function togglePomodoro(){ if(pomodoroRunning) stopPomodoro(); else startPomodoro(); }
document.getElementById('pomodoroBtn')?.addEventListener('click',togglePomodoro);

// --------------------------------------------------------------
// 5. НАВИГАЦИЯ, ТЕМА, АКЦЕНТ, ЭКСПОРТ/ИМПОРТ
// --------------------------------------------------------------
function switchPanel(panel){
    document.getElementById('notesPanel').classList.toggle('hidden', panel!=='notes');
    document.getElementById('cryptoPanel').classList.toggle('hidden', panel!=='crypto');
    document.getElementById('settingsPanel').classList.toggle('hidden', panel!=='settings');
    let tabs={notes:'tabNotes', crypto:'tabCrypto', settings:'tabSettings'};
    for(let [key,id] of Object.entries(tabs)){
        let btn=document.getElementById(id);
        if(key===panel){ btn.classList.add('text-accent'); btn.classList.remove('text-zinc-500'); }
        else{ btn.classList.remove('text-accent'); btn.classList.add('text-zinc-500'); }
    }
}
function toggleTheme(){
    let isDark=document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme',isDark?'dark':'light');
}
function setAccent(color){
    document.documentElement.style.setProperty('--color-accent',color);
    localStorage.setItem('accentColor',color);
}
function exportAll(){
    let data={notes, vault:localStorage.getItem('mv_vault_data')};
    let blob=new Blob([JSON.stringify(data)],{type:'application/json'});
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='mindvault_backup.json';
    a.click();
}
function importData(input){
    let f=input.files[0];
    if(!f) return;
    let r=new FileReader();
    r.onload=e=>{
        try{
            let d=JSON.parse(e.target.result);
            if(d.notes){ notes=d.notes; localStorage.setItem('mv_notes',JSON.stringify(notes)); renderNotes(); }
            if(d.vault) localStorage.setItem('mv_vault_data',d.vault);
            showToast("Импорт выполнен","✅");
        }catch(e){ showToast("Ошибка файла","❌"); }
    };
    r.readAsText(f);
}
document.getElementById('importFile')?.addEventListener('change',e=>importData(e.target));
function showToast(msg,icon=''){
    let t=document.getElementById('toast');
    t.innerHTML=`${icon} ${msg}`;
    t.classList.remove('hidden');
    setTimeout(()=>t.classList.add('hidden'),2000);
}

// --------------------------------------------------------------
// ИНИЦИАЛИЗАЦИЯ
// --------------------------------------------------------------
document.addEventListener('DOMContentLoaded',()=>{
    if(localStorage.getItem('theme')==='light') document.documentElement.classList.remove('dark');
    else document.documentElement.classList.add('dark');
    let savedAccent=localStorage.getItem('accentColor');
    if(savedAccent) document.documentElement.style.setProperty('--color-accent',savedAccent);
    renderNotes();
    switchPanel('notes');
    if(Notification.permission==='default') Notification.requestPermission();
    // Создаём элемент edit-bar, если его нет (для совместимости)
    if(!document.getElementById('edit-bar')){
        let div=document.createElement('div');
        div.id='edit-bar';
        div.className='hidden bg-amber-500/20 p-3 rounded-xl justify-between mb-4';
        div.innerHTML='<span>✏️ Редактирование</span><button onclick="cancelEditNote()">Отмена</button>';
        document.getElementById('notesPanel').insertBefore(div, document.getElementById('notesPanel').firstChild);
    }
});
