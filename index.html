<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MindVault Pro — стабильная версия</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --color-accent: #f43f5e; --color-accent-hover: #e11d48; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #09090b; color: #fafafa; transition: background 0.2s; }
        html.light body { background: #f4f4f5; color: #18181b; }
        .nav-btn { min-height: 44px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .tab-active { background-color: var(--color-accent) !important; color: white !important; }
        .note-tab-btn { transition: all 0.2s; white-space: nowrap; }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 5px;
            aspect-ratio: 1 / 1;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 8px;
        }
        .candy {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            cursor: pointer;
            transition: transform 0.05s linear;
            backdrop-filter: blur(2px);
        }
        html.light .candy { background: rgba(0,0,0,0.05); }
        .candy.selected { transform: scale(1.05); background: var(--color-accent); box-shadow: 0 0 0 2px white; }
        .pop-effect { animation: pop 0.12s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes pop { 100% { transform: scale(0.2); opacity: 0; } }
        .fall-effect { animation: fall 0.2s ease-out; }
        @keyframes fall { from { transform: translateY(-35px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .bomb-pulse { animation: pulse 0.2s infinite alternate; }
        @keyframes pulse { to { filter: drop-shadow(0 0 10px #ff4444); } }
        .plane-fly { position: fixed; font-size: 2rem; pointer-events: none; z-index: 200; filter: drop-shadow(0 4px 6px black); }
        .toast { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="dark">
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-zinc-800 text-white px-4 py-2 rounded-xl z-50 hidden text-sm"></div>
    <div id="photo-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50" onclick="closePhotoModal()">
        <img id="modal-img" class="max-w-[90%] max-h-[90%] rounded-2xl">
        <button class="absolute top-5 right-5 text-2xl">✕</button>
    </div>

    <main class="max-w-md mx-auto px-4 pt-5 pb-20 flex flex-col gap-5">
        <header class="flex justify-between items-center">
            <div><h1 class="text-2xl font-bold">MindVault <span style="color:var(--color-accent)">Pro</span></h1><p class="text-[11px] text-zinc-500">Локальный сейф + игра</p></div>
            <span id="sw-status" class="text-[10px] bg-zinc-800 px-2 py-1 rounded">офлайн</span>
        </header>

        <!-- ЗАМЕТКИ -->
        <section id="notes-section">
            <div id="edit-bar" class="hidden bg-amber-500/20 p-3 rounded-xl justify-between mb-3"><span>✏️ Редактирование</span><button onclick="cancelEditNote()">Отмена</button></div>
            <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                <button onclick="filterNotes('all',this)" class="note-tab-btn tab-active px-3 py-1.5 rounded-lg text-sm font-semibold whitespace-nowrap">Все</button>
                <button onclick="filterNotes('💡 Мысли',this)" class="note-tab-btn px-3 py-1.5 rounded-lg bg-zinc-800 text-zinc-300 whitespace-nowrap">💡 Мысли</button>
                <button onclick="filterNotes('📅 Задачи',this)" class="note-tab-btn px-3 py-1.5 rounded-lg bg-zinc-800 text-zinc-300 whitespace-nowrap">📅 Задачи</button>
                <button onclick="filterNotes('💼 Работа',this)" class="note-tab-btn px-3 py-1.5 rounded-lg bg-zinc-800 text-zinc-300 whitespace-nowrap">💼 Работа</button>
            </div>
            <div class="bg-zinc-900/80 border border-zinc-800 rounded-2xl p-4">
                <textarea id="noteText" class="w-full bg-zinc-950 rounded-xl p-3 text-sm border border-zinc-800 h-24 resize-none" placeholder="Текст заметки, #тег, **жирный**..."></textarea>
                <div id="imgPreview" class="hidden mt-2 w-16 h-16 relative"><img id="previewImg" class="rounded-lg object-cover w-full h-full"><button onclick="clearImage()" class="absolute -top-1 -right-1 bg-black rounded-full w-5 h-5 text-xs">✕</button></div>
                <div class="flex justify-between mt-3"><label class="bg-zinc-800 px-3 py-2 rounded-xl text-xs cursor-pointer">📷 Прикрепить фото<input type="file" id="photoInput" accept="image/*" class="hidden"></label><button onclick="saveNote()" class="px-4 py-2 rounded-xl text-white text-xs font-bold" style="background:var(--color-accent)">Сохранить</button></div>
            </div>
            <div id="notesList" class="flex flex-col gap-3 max-h-96 overflow-auto mt-2"></div>
        </section>

        <!-- СЕЙФ -->
        <section id="crypto-section" class="hidden">
            <div id="cryptoLock" class="bg-zinc-900 rounded-2xl p-6 text-center">
                <div class="w-12 h-12 mx-auto bg-cyan-500/20 rounded-full flex items-center justify-center text-cyan-500 mb-3">🔐</div>
                <h3 class="font-bold mb-1">Секретный сейф</h3>
                <p class="text-xs text-zinc-500 mb-4">AES-256, всё локально</p>
                <input type="password" id="masterPass" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-3 text-center mb-3" placeholder="Мастер-пароль">
                <button onclick="unlockVault()" class="w-full bg-cyan-600 py-2 rounded-xl text-sm font-bold">Открыть сейф</button>
            </div>
            <div id="cryptoContent" class="hidden flex flex-col gap-4">
                <div class="bg-zinc-900 rounded-2xl p-4">
                    <div class="flex gap-2 text-xs bg-zinc-950 p-1 rounded-xl mb-3"><button onclick="setVaultMode('pass')" id="modePassBtn" class="flex-1 py-1 rounded-lg bg-zinc-800">Пароль</button><button onclick="setVaultMode('seed')" id="modeSeedBtn" class="flex-1 py-1 rounded-lg">Seed</button></div>
                    <div id="passForm">
                        <input type="text" id="vaultTitle" class="w-full bg-zinc-950 rounded-xl p-2 text-sm mb-2" placeholder="Ресурс / Название">
                        <input type="text" id="vaultLogin" class="w-full bg-zinc-950 rounded-xl p-2 text-sm mb-2" placeholder="Логин (опционально)">
                        <div class="flex gap-2"><input type="password" id="vaultSecret" class="flex-1 bg-zinc-950 rounded-xl p-2 text-sm" placeholder="Пароль / секрет"><button onclick="toggleSecretField()" class="px-3 bg-zinc-800 rounded-xl">👁</button><button onclick="genPassword()" class="px-3 bg-zinc-800 rounded-xl">⚡</button><button onclick="pasteClipboard()" class="px-3 bg-zinc-800 rounded-xl">📋</button></div>
                    </div>
                    <div id="seedForm" class="hidden">
                        <input type="text" id="seedTitle" class="w-full bg-zinc-950 rounded-xl p-2 text-sm mb-2" placeholder="Название кошелька">
                        <textarea id="seedPhrase" class="w-full bg-zinc-950 rounded-xl p-2 text-sm h-20 font-mono" placeholder="12/24 слова"></textarea>
                    </div>
                    <button onclick="saveVaultEntry()" class="w-full mt-3 bg-cyan-600 py-2 rounded-xl text-sm font-bold">Добавить и зашифровать</button>
                </div>
                <div id="vaultList" class="flex flex-col gap-2 max-h-80 overflow-auto"></div>
            </div>
        </section>

        <!-- ИГРА -->
        <section id="game-section" class="hidden">
            <div class="flex justify-between font-bold px-2"><span>Уровень <span id="gameLevel">1</span></span><span>Счёт <span id="gameScore">0</span></span></div>
            <div class="game-grid" id="gameGrid"></div>
            <p class="text-[11px] text-center text-zinc-500 mt-2">🔴🟡🟢 4 в ряд → 💣 (3x3) | Квадрат 2x2 → ✈️ (5 рандом) | ❄️ лёд (2 удара) | 🧱 стена (3 удара)</p>
        </section>

        <!-- НАСТРОЙКИ -->
        <section id="settings-section" class="hidden">
            <div class="bg-zinc-900 rounded-2xl p-4 flex flex-col gap-4">
                <div class="flex justify-between"><span>🌙 Тема</span><button onclick="toggleTheme()" class="px-4 py-1 bg-zinc-800 rounded-xl text-sm">Тёмная</button></div>
                <div><span>🎨 Акцент</span><div class="flex gap-3 mt-2"><div onclick="setAccent('#f43f5e')" class="w-8 h-8 rounded-full bg-rose-500"></div><div onclick="setAccent('#3b82f6')" class="w-8 h-8 rounded-full bg-blue-500"></div><div onclick="setAccent('#10b981')" class="w-8 h-8 rounded-full bg-emerald-500"></div><div onclick="setAccent('#a855f7')" class="w-8 h-8 rounded-full bg-purple-500"></div></div></div>
                <div class="flex gap-2"><button onclick="exportAll()" class="flex-1 py-2 bg-zinc-800 rounded-xl text-sm">📦 Экспорт</button><label class="flex-1 py-2 bg-zinc-800 rounded-xl text-sm text-center cursor-pointer">📥 Импорт<input type="file" id="importFile" class="hidden" accept=".json"></label></div>
            </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-zinc-900/90 backdrop-blur-lg border-t border-zinc-800 py-2 pb-safe">
        <div class="max-w-md mx-auto flex justify-around">
            <button onclick="switchTab('notes')" id="tabNotes" class="nav-btn text-accent"><span class="text-xl">📝</span><span class="text-[10px]">Заметки</span></button>
            <button onclick="switchTab('crypto')" id="tabCrypto" class="nav-btn text-zinc-500"><span class="text-xl">🔐</span><span class="text-[10px]">Сейф</span></button>
            <button onclick="switchTab('game')" id="tabGame" class="nav-btn text-zinc-500"><span class="text-xl">🎮</span><span class="text-[10px]">Игра</span></button>
            <button onclick="switchTab('settings')" id="tabSettings" class="nav-btn text-zinc-500"><span class="text-xl">⚙️</span><span class="text-[10px]">Настройки</span></button>
        </div>
    </nav>

<script>
// ----------------------------------------------------------------------
// 1. ЗАМЕТКИ (полностью рабочие)
// ----------------------------------------------------------------------
let notes = JSON.parse(localStorage.getItem('mv_notes') || '[]');
let currentNoteFilter = 'all';
let editingNoteId = null;
let pendingImage = null;

function renderNotes() {
    const container = document.getElementById('notesList');
    if (!container) return;
    let filtered = notes;
    if (currentNoteFilter !== 'all') {
        if (currentNoteFilter.startsWith('#')) filtered = notes.filter(n => n.text.includes(currentNoteFilter));
        else filtered = notes.filter(n => n.category === currentNoteFilter);
    }
    if (filtered.length === 0) { container.innerHTML = '<div class="text-center text-zinc-500 py-8">Нет заметок</div>'; return; }
    container.innerHTML = filtered.map(n => `
        <div class="bg-zinc-900 border border-zinc-800 rounded-xl p-3">
            <div class="flex justify-between"><span class="text-[10px] font-bold px-2 py-0.5 rounded bg-zinc-800">${escapeHtml(n.category)}</span><span class="text-[10px] text-zinc-500">${n.date || ''}</span></div>
            ${n.image ? `<img src="${n.image}" class="w-full h-28 object-cover rounded-lg my-2 cursor-pointer" onclick="openPhoto('${n.image}')">` : ''}
            <div class="text-sm mt-1">${parseNoteText(n.text)}</div>
            <div class="flex justify-end gap-3 mt-2"><button onclick="editNoteById(${n.id})" class="text-xs text-amber-500">✏️</button><button onclick="deleteNoteById(${n.id})" class="text-xs text-red-500">🗑️</button></div>
        </div>
    `).join('');
}

function parseNoteText(txt) {
    let s = escapeHtml(txt).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\*(.*?)\*/g, '<em>$1</em>');
    return s.replace(/(^|\s)#([\wа-яА-Я]+)/g, '$1<span class="font-bold cursor-pointer" style="color:var(--color-accent)" onclick="filterNotes(\'#$2\',null)">#$2</span>');
}

function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

function saveNote() {
    let text = document.getElementById('noteText').value.trim();
    if (!text && !pendingImage) { showToast("Напишите что-нибудь", "⚠️"); return; }
    let cat = (currentNoteFilter === 'all' || currentNoteFilter.startsWith('#')) ? '💡 Мысли' : currentNoteFilter;
    if (editingNoteId) {
        let idx = notes.findIndex(n => n.id === editingNoteId);
        if (idx !== -1) {
            notes[idx] = { ...notes[idx], text, category: cat, image: pendingImage || notes[idx].image };
        }
        editingNoteId = null;
        document.getElementById('edit-bar').classList.add('hidden');
    } else {
        notes.unshift({ id: Date.now(), text, category: cat, date: new Date().toLocaleDateString('ru'), image: pendingImage });
    }
    localStorage.setItem('mv_notes', JSON.stringify(notes));
    document.getElementById('noteText').value = '';
    clearImage();
    renderNotes();
    showToast("Сохранено", "✅");
}

function editNoteById(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    editingNoteId = id;
    document.getElementById('noteText').value = note.text;
    if (note.image) { pendingImage = note.image; document.getElementById('previewImg').src = note.image; document.getElementById('imgPreview').classList.remove('hidden'); }
    document.getElementById('edit-bar').classList.remove('hidden');
}

function deleteNoteById(id) { if (confirm("Удалить заметку?")) { notes = notes.filter(n => n.id !== id); localStorage.setItem('mv_notes', JSON.stringify(notes)); renderNotes(); showToast("Удалено", "🗑️"); } }
function cancelEditNote() { editingNoteId = null; document.getElementById('noteText').value = ''; clearImage(); document.getElementById('edit-bar').classList.add('hidden'); }
function clearImage() { pendingImage = null; document.getElementById('imgPreview').classList.add('hidden'); document.getElementById('photoInput').value = ''; }
function previewImage(file) { if (file) { const r = new FileReader(); r.onload = e => { pendingImage = e.target.result; document.getElementById('previewImg').src = pendingImage; document.getElementById('imgPreview').classList.remove('hidden'); }; r.readAsDataURL(file); } }
document.getElementById('photoInput')?.addEventListener('change', e => previewImage(e.target.files[0]));
function openPhoto(src) { const modal = document.getElementById('photo-modal'); document.getElementById('modal-img').src = src; modal.classList.remove('hidden'); modal.classList.add('flex'); }
function closePhotoModal() { document.getElementById('photo-modal').classList.add('hidden'); }

function filterNotes(cat, btn) {
    currentNoteFilter = cat;
    renderNotes();
    document.querySelectorAll('.note-tab-btn').forEach(b => { b.classList.remove('tab-active'); b.classList.add('bg-zinc-800', 'text-zinc-300'); });
    if (btn) { btn.classList.add('tab-active'); btn.classList.remove('bg-zinc-800'); }
}

// ----------------------------------------------------------------------
// 2. СЕЙФ (исправлен ключ + расшифровка)
// ----------------------------------------------------------------------
let currentMasterKey = '';
let vaultItems = [];
let vaultMode = 'pass';

function unlockVault() {
    let pass = document.getElementById('masterPass').value;
    if (!pass) { showToast("Введите пароль", "🔑"); return; }
    let key = CryptoJS.SHA256(pass).toString();
    let encrypted = localStorage.getItem('mv_vault_data');
    if (!encrypted) {
        let empty = CryptoJS.AES.encrypt(JSON.stringify([]), key).toString();
        localStorage.setItem('mv_vault_data', empty);
        currentMasterKey = key;
        vaultItems = [];
        showVaultContent();
        return;
    }
    try {
        let bytes = CryptoJS.AES.decrypt(encrypted, key);
        let decrypted = bytes.toString(CryptoJS.enc.Utf8);
        if (!decrypted) throw new Error();
        vaultItems = JSON.parse(decrypted);
        currentMasterKey = key;
        showVaultContent();
    } catch(e) {
        showToast("Неверный пароль!", "❌");
        currentMasterKey = '';
    }
}

function showVaultContent() {
    document.getElementById('cryptoLock').classList.add('hidden');
    document.getElementById('cryptoContent').classList.remove('hidden');
    renderVaultList();
}

function renderVaultList() {
    let container = document.getElementById('vaultList');
    if (!container) return;
    if (!vaultItems.length) { container.innerHTML = '<div class="text-center text-zinc-500 py-4">Нет записей</div>'; return; }
    container.innerHTML = vaultItems.map(item => `
        <div class="bg-zinc-950 border border-zinc-800 rounded-xl p-3">
            <div class="flex justify-between"><span class="font-bold text-sm">${escapeHtml(item.title)}</span><button onclick="copyToClipboard('${item.secret.replace(/'/g, "\\'")}')" class="text-cyan-500 text-xs">📋</button></div>
            ${item.login ? `<div class="text-xs text-zinc-400">${escapeHtml(item.login)}</div>` : ''}
            <div class="mt-1 text-xs font-mono break-all">${item.type === 'seed' ? `<textarea readonly class="w-full bg-zinc-900 rounded p-1 text-[11px]">${item.secret}</textarea>` : `<input type="password" value="${item.secret}" readonly class="w-full bg-zinc-900 rounded p-1 text-[11px]" id="secret-${item.id}"><button onclick="toggleSecretShow('secret-${item.id}')" class="text-xs mt-1">👁️ показать</button>`}</div>
            <button onclick="deleteVaultItem(${item.id})" class="text-red-400 text-xs mt-2">Удалить</button>
        </div>
    `).join('');
}

function saveVaultEntry() {
    if (!currentMasterKey) { showToast("Сейф не открыт", "🔒"); return; }
    let title, login = '', secret, type = vaultMode;
    if (vaultMode === 'pass') {
        title = document.getElementById('vaultTitle').value.trim();
        login = document.getElementById('vaultLogin').value.trim();
        secret = document.getElementById('vaultSecret').value.trim();
        if (!title || !secret) { showToast("Заполните название и секрет", "⚠️"); return; }
    } else {
        title = document.getElementById('seedTitle').value.trim();
        secret = document.getElementById('seedPhrase').value.trim();
        if (!title || !secret) { showToast("Заполните название и seed", "⚠️"); return; }
    }
    vaultItems.push({ id: Date.now(), type: vaultMode, title, login, secret });
    saveEncryptedVault();
    renderVaultList();
    document.getElementById('vaultTitle').value = '';
    document.getElementById('vaultLogin').value = '';
    document.getElementById('vaultSecret').value = '';
    document.getElementById('seedTitle').value = '';
    document.getElementById('seedPhrase').value = '';
    showToast("Данные зашифрованы", "🛡️");
}

function deleteVaultItem(id) { vaultItems = vaultItems.filter(i => i.id !== id); saveEncryptedVault(); renderVaultList(); }
function saveEncryptedVault() { if(currentMasterKey) { let encrypted = CryptoJS.AES.encrypt(JSON.stringify(vaultItems), currentMasterKey).toString(); localStorage.setItem('mv_vault_data', encrypted); } }
function copyToClipboard(text) { navigator.clipboard.writeText(text); showToast("Скопировано", "📋"); }
function toggleSecretShow(id) { let input = document.getElementById(id); if (input) input.type = input.type === 'password' ? 'text' : 'password'; }
function toggleSecretField() { let f = document.getElementById('vaultSecret'); if (f) f.type = f.type === 'password' ? 'text' : 'password'; }
function genPassword() { let chars = "ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*"; let p = ""; for(let i=0;i<14;i++) p+= chars[Math.floor(Math.random()*chars.length)]; document.getElementById('vaultSecret').value = p; }
function pasteClipboard() { navigator.clipboard.readText().then(t => document.getElementById('vaultSecret').value = t).catch(()=>showToast("Нет доступа","⚠️")); }
function setVaultMode(mode) { vaultMode = mode; document.getElementById('passForm').classList.toggle('hidden', mode !== 'pass'); document.getElementById('seedForm').classList.toggle('hidden', mode !== 'seed'); document.getElementById('modePassBtn').classList.toggle('bg-zinc-800', mode==='pass'); document.getElementById('modeSeedBtn').classList.toggle('bg-zinc-800', mode==='seed'); }

// ----------------------------------------------------------------------
// 3. ИГРА (плавная, без ряби, препятствия с уровней)
// ----------------------------------------------------------------------
const W = 8;
let gameBoard = [], gameScore = 0, gameLevel = 1, selectedIdx = null, gameBusy = false;
const COLORS_LIST = ['🔴','🟡','🟢','🔵','🟣'];
const BOMB_EMOJI = '💣', PLANE_EMOJI = '✈️', ICE_EMOJI = '❄️', WALL_EMOJI = '🧱';

class Tile { constructor(type, color=null, hp=1) { this.type = type; this.color = color; this.hp = hp; } display() { if(this.type==='bomb') return BOMB_EMOJI; if(this.type==='plane') return PLANE_EMOJI; if(this.type==='ice') return ICE_EMOJI; if(this.type==='wall') return WALL_EMOJI; return this.color; } }

function initGame() {
    gameBoard = []; gameScore = 0; gameLevel = 1; selectedIdx = null; gameBusy = false;
    for(let i=0;i<W*W;i++) gameBoard.push(new Tile('normal', COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]));
    while(clearMatchesSilent()); 
    updateGameUI();
    renderGame();
}
function updateGameUI() { document.getElementById('gameScore').innerText = gameScore; let lvl = Math.floor(gameScore/120)+1; if(lvl>gameLevel) { gameLevel=lvl; showToast(`Уровень ${gameLevel}! 🧊❄️`,'🏆'); } document.getElementById('gameLevel').innerText = gameLevel; }
function renderGame() { let grid = document.getElementById('gameGrid'); if(!grid) return; grid.innerHTML = ''; for(let i=0;i<gameBoard.length;i++){ let tile = gameBoard[i]; let div = document.createElement('div'); div.className = 'candy'; if(selectedIdx===i) div.classList.add('selected'); if(tile.type==='ice') div.style.background='#88ccff40'; if(tile.type==='wall') div.style.background='#aa774430'; div.innerText = tile.display(); div.onclick = ()=>onTileClick(i); grid.appendChild(div); } }
async function onTileClick(idx) { if(gameBusy) return; let tile = gameBoard[idx]; if(tile.type==='bomb') { explodeBomb(idx); return; } if(tile.type==='plane') { activatePlane(idx); return; } if(selectedIdx===null) { selectedIdx=idx; renderGame(); return; } let diff = Math.abs(selectedIdx-idx); let sameRow = Math.floor(selectedIdx/W)===Math.floor(idx/W); if((diff===1 && sameRow) || diff===W) { await trySwap(selectedIdx, idx); } selectedIdx=null; renderGame(); }
async function trySwap(a,b) { if(gameBusy) return; gameBusy=true; [gameBoard[a], gameBoard[b]] = [gameBoard[b], gameBoard[a]]; renderGame(); await delay(70); let had = await processMatches(true); if(!had) { [gameBoard[a], gameBoard[b]] = [gameBoard[b], gameBoard[a]]; renderGame(); } gameBusy=false; }
async function processMatches(award) { let any = false; while(true){ let matches = findAllMatches(); if(matches.size===0) break; any=true; let bombSpots=[], planeSpots=[]; for(let pos of matches){ let t=gameBoard[pos]; if(t.type==='ice'||t.type==='wall'){ t.hp--; if(t.hp<=0){ gameBoard[pos]=new Tile('normal', COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]); if(award) gameScore+=6; } else { if(award) gameScore+=2; } continue; } if(t.type==='normal' && award) gameScore+=10; if(t.type==='bomb') bombSpots.push(pos); if(t.type==='plane') planeSpots.push(pos); gameBoard[pos]=null; } for(let p of bombSpots) gameBoard[p]=new Tile('bomb'); for(let p of planeSpots) gameBoard[p]=new Tile('plane'); for(let i=0;i<gameBoard.length;i++) if(gameBoard[i]===null) gameBoard[i]=new Tile('normal', COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]); await applyGravityAndRefill(); updateGameUI(); if(findAllMatches().size>0){ await processMatches(award); return true; } } if(any) updateGameUI(); return any; }
function findAllMatches() { let set = new Set(); for(let r=0;r<W;r++) for(let c=0;c<W-2;c++){ let idx=r*W+c, t=gameBoard[idx]; if(!t||t.type!=='normal') continue; let len=1; while(c+len<W && gameBoard[r*W+c+len]?.type==='normal' && gameBoard[r*W+c+len]?.color===t.color) len++; if(len>=3){ for(let k=0;k<len;k++) set.add(idx+k); if(len>=4){ let mid=idx+Math.floor(len/2); if(gameBoard[mid]?.type==='normal') gameBoard[mid]=new Tile('bomb'); } } c+=len-1; } for(let c=0;c<W;c++) for(let r=0;r<W-2;r++){ let idx=r*W+c, t=gameBoard[idx]; if(!t||t.type!=='normal') continue; let len=1; while(r+len<W && gameBoard[(r+len)*W+c]?.type==='normal' && gameBoard[(r+len)*W+c]?.color===t.color) len++; if(len>=3){ for(let k=0;k<len;k++) set.add(idx+k*W); if(len>=4){ let mid=idx+Math.floor(len/2)*W; if(gameBoard[mid]?.type==='normal') gameBoard[mid]=new Tile('bomb'); } } r+=len-1; } for(let r=0;r<W-1;r++) for(let c=0;c<W-1;c++){ let a=gameBoard[r*W+c], b=gameBoard[r*W+c+1], c1=gameBoard[(r+1)*W+c], d=gameBoard[(r+1)*W+c+1]; if(a?.type==='normal' && b?.type==='normal' && c1?.type==='normal' && d?.type==='normal' && a.color===b.color && a.color===c1.color && a.color===d.color){ let center=r*W+c; if(gameBoard[center]?.type==='normal') gameBoard[center]=new Tile('plane'); set.add(center); set.add(center+1); set.add(center+W); set.add(center+W+1); } } return set; }
async function applyGravityAndRefill() { for(let c=0;c<W;c++){ let column=[]; for(let r=W-1;r>=0;r--) if(gameBoard[r*W+c]!==null) column.push(gameBoard[r*W+c].clone()); while(column.length<W){ let rnd=COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]; let newTile; if(gameLevel>=3 && Math.random()<0.12) newTile = new Tile('ice',null,2); else if(gameLevel>=6 && Math.random()<0.08) newTile = new Tile('wall',null,3); else newTile = new Tile('normal',rnd); column.push(newTile); } for(let r=0;r<W;r++){ let idx=(W-1-r)*W+c; gameBoard[idx]=column[r]; let div = document.getElementById('gameGrid')?.children[idx]; if(div) div.classList.add('fall-effect'); } } await delay(180); renderGame(); }
async function explodeBomb(idx){ if(gameBusy) return; gameBusy=true; let r0=Math.floor(idx/W), c0=idx%W, targets=[]; for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){ let nr=r0+dr, nc=c0+dc; if(nr>=0 && nr<W && nc>=0 && nc<W) targets.push(nr*W+nc); } for(let pos of targets){ let tile=gameBoard[pos]; if(tile && (tile.type==='ice'||tile.type==='wall')) tile.hp=Math.max(0,tile.hp-1); else if(tile && tile.type!=='bomb' && tile.type!=='plane') gameBoard[pos]=null; if(pos!==idx && gameBoard[pos] && (gameBoard[pos].type==='bomb'||gameBoard[pos].type==='plane')) explodeBomb(pos); } gameBoard[idx]=null; for(let i=0;i<gameBoard.length;i++) if(gameBoard[i]===null) gameBoard[i]=new Tile('normal', COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]); await applyGravityAndRefill(); await processMatches(true); updateGameUI(); gameBusy=false; renderGame(); }
async function activatePlane(idx){ if(gameBusy) return; gameBusy=true; let flyDiv = document.createElement('div'); flyDiv.className='plane-fly'; flyDiv.innerText='✈️💨'; document.body.appendChild(flyDiv); flyDiv.style.left='0px'; flyDiv.style.top=window.innerHeight/2+'px'; for(let i=0;i<=100;i++){ flyDiv.style.left=(window.innerWidth*i/100)+'px'; flyDiv.style.top=window.innerHeight/2+Math.sin(i*0.15)*12+'px'; await delay(10); } flyDiv.remove(); let destroyed=new Set(); while(destroyed.size<5 && destroyed.size<W*W){ let r=Math.floor(Math.random()*gameBoard.length); if(gameBoard[r] && gameBoard[r].type!=='wall') destroyed.add(r); } for(let pos of destroyed){ let tile=gameBoard[pos]; if(tile && (tile.type==='ice'||tile.type==='wall')) tile.hp=Math.max(0,tile.hp-1); else gameBoard[pos]=null; let div=document.getElementById('gameGrid')?.children[pos]; if(div) div.classList.add('pop-effect'); } await delay(150); for(let pos of destroyed) if(gameBoard[pos]===null) gameBoard[pos]=new Tile('normal', COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]); gameBoard[idx]=null; for(let i=0;i<gameBoard.length;i++) if(gameBoard[i]===null) gameBoard[i]=new Tile('normal', COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]); await applyGravityAndRefill(); await processMatches(true); updateGameUI(); gameBusy=false; renderGame(); }
function clearMatchesSilent() { let m = findAllMatches(); if(m.size===0) return false; for(let p of m){ if(gameBoard[p] && (gameBoard[p].type==='ice'||gameBoard[p].type==='wall')) gameBoard[p].hp--; else gameBoard[p]=null; } for(let i=0;i<gameBoard.length;i++) if(gameBoard[i]===null) gameBoard[i]=new Tile('normal', COLORS_LIST[Math.floor(Math.random()*COLORS_LIST.length)]); return true; }
Tile.prototype.clone = function() { return new Tile(this.type, this.color, this.hp); };
function delay(ms) { return new Promise(r=>setTimeout(r,ms)); }

// ----------------------------------------------------------------------
// 4. ОБЩИЕ ФУНКЦИИ
// ----------------------------------------------------------------------
function switchTab(tab) {
    document.getElementById('notes-section').classList.toggle('hidden', tab !== 'notes');
    document.getElementById('crypto-section').classList.toggle('hidden', tab !== 'crypto');
    document.getElementById('game-section').classList.toggle('hidden', tab !== 'game');
    document.getElementById('settings-section').classList.toggle('hidden', tab !== 'settings');
    let tabs = { notes: 'tabNotes', crypto: 'tabCrypto', game: 'tabGame', settings: 'tabSettings' };
    for (let [key, id] of Object.entries(tabs)) {
        let btn = document.getElementById(id);
        if (key === tab) { btn.classList.add('text-accent'); btn.classList.remove('text-zinc-500'); }
        else { btn.classList.remove('text-accent'); btn.classList.add('text-zinc-500'); }
    }
}
function toggleTheme() { document.documentElement.classList.toggle('dark'); let isDark = document.documentElement.classList.contains('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); }
function setAccent(color) { document.documentElement.style.setProperty('--color-accent', color); localStorage.setItem('accentColor', color); }
function exportAll() { let data = { notes, vault: localStorage.getItem('mv_vault_data') }; let blob = new Blob([JSON.stringify(data)], {type:'application/json'}); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'mindvault_backup.json'; a.click(); }
function importData(input) { let f = input.files[0]; if(!f) return; let r = new FileReader(); r.onload = e => { try{ let d = JSON.parse(e.target.result); if(d.notes) { notes = d.notes; localStorage.setItem('mv_notes', JSON.stringify(notes)); renderNotes(); } if(d.vault) localStorage.setItem('mv_vault_data', d.vault); showToast("Импорт выполнен","✅"); }catch(e){ showToast("Ошибка файла","❌"); } }; r.readAsText(f); }
document.getElementById('importFile')?.addEventListener('change', e => importData(e.target));
function showToast(msg, icon='') { let t = document.getElementById('toast'); t.innerHTML = `${icon} ${msg}`; t.classList.remove('hidden'); setTimeout(()=> t.classList.add('hidden'), 2000); }

// Инициализация
document.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark'); else document.documentElement.classList.add('dark');
    let savedAccent = localStorage.getItem('accentColor'); if (savedAccent) document.documentElement.style.setProperty('--color-accent', savedAccent);
    renderNotes(); initGame(); switchTab('notes');
});
</script>
