<!DOCTYPE html>
<html lang="ru" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#09090b">
    <title>MindVault Pro | Игра с анимацией</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { accent: 'var(--color-accent)', accentHover: 'var(--color-accent-hover)', crypto: '#06b6d4' } } } }
    </script>
    <style>
        :root { --color-accent: #f43f5e; --color-accent-hover: #e11d48; }
        * { box-sizing: border-box; user-select: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .game-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; width: 100%; aspect-ratio: 1 / 1; background: rgba(0,0,0,0.25); border-radius: 1rem; padding: 6px; }
        .candy { display: flex; align-items: center; justify-content: center; font-size: clamp(1.3rem, 6vw, 2rem); border-radius: 10px; background: rgba(255,255,255,0.07); cursor: pointer; transition: transform 0.1s ease, filter 0.1s; backdrop-filter: blur(2px); }
        html.light .candy { background: rgba(0,0,0,0.05); }
        .candy.selected { transform: scale(1.1); background: var(--color-accent); box-shadow: 0 0 0 2px white, 0 4px 12px black; }
        .candy:active { transform: scale(0.95); }
        .pop-animation { animation: popOff 0.15s cubic-bezier(0.34, 1.2, 0.64, 1) forwards !important; }
        @keyframes popOff { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(0); opacity: 0; } }
        .fall-animation { animation: fallDrop 0.2s ease-out; }
        @keyframes fallDrop { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .bomb-shake { animation: bombPulse 0.25s infinite alternate; }
        @keyframes bombPulse { from { filter: drop-shadow(0 0 2px red); transform: scale(1); } to { filter: drop-shadow(0 0 12px #ff5555); transform: scale(1.1); } }
        .plane-fly { position: fixed; z-index: 200; font-size: 2.5rem; pointer-events: none; transition: transform 0.02s linear; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3)); }
        .ice-crack { background: linear-gradient(135deg, #a0e7ff, #6bc9ff); border-radius: 10px; position: relative; }
        .wall-crack { background: linear-gradient(135deg, #8b5a2b, #5a3a1a); border-radius: 10px; }
        .toast-show { animation: toast-in 0.2s ease forwards; }
        .toast-hide { animation: toast-out 0.2s ease forwards; }
        @keyframes toast-in { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes toast-out { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, -10px); } }
        .nav-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }
        .main-safe { padding-bottom: max(5rem, calc(4rem + env(safe-area-inset-bottom))); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col dark">
    <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-zinc-800 border border-zinc-700 text-sm px-4 py-3 rounded-xl shadow-2xl z-50 pointer-events-none hidden text-white"></div>
    <div id="photo-modal" onclick="closePhotoModal()" class="fixed inset-0 bg-black/92 z-50 hidden items-center justify-center p-4"><img id="modal-img" class="max-w-full max-h-full rounded-xl"><button class="absolute top-4 right-4 w-9 h-9 rounded-full bg-white/10">✕</button></div>
    <main class="w-full max-w-md mx-auto px-4 pt-6 flex-1 flex flex-col gap-4 main-safe">
        <header class="flex justify-between"><div><h1 class="text-2xl font-bold">MindVault <span style="color:var(--color-accent)">Pro</span></h1><p class="text-[11px] text-zinc-500" id="sw-status-text">Игровой движок v2.0</p></div><div><span id="sw-badge" class="text-[10px] px-2 py-1 rounded-md bg-zinc-800">Push: —</span></div></header>
        <section id="section-notes" class="flex flex-col gap-4"><div id="edit-indicator" class="hidden bg-amber-500/10 p-3 rounded-xl justify-between"><span>✏️ Редакт</span><button onclick="cancelEdit()">Отмена</button></div><div class="flex gap-1 overflow-x-auto" id="filter-tabs"><button onclick="filterNotes('all',this)" class="note-tab-btn tab-active px-3 py-1.5 rounded-lg">Все</button><button onclick="filterNotes('💡 Мысли',this)" class="note-tab-btn">💡 Мысли</button><button onclick="filterNotes('📅 Задачи',this)" class="note-tab-btn">📅 Задачи</button><button onclick="filterNotes('💼 Работа',this)" class="note-tab-btn">💼 Работа</button></div><div class="bg-white dark:bg-zinc-900 rounded-2xl p-4"><textarea id="note-input" class="w-full bg-zinc-50 dark:bg-zinc-950 rounded-xl p-3 h-24" placeholder="Заметка..."></textarea><div class="flex justify-between mt-2"><label class="cursor-pointer bg-zinc-100 px-3 py-2 rounded-xl">📷 Фото<input type="file" id="note-image-input" accept="image/*" class="hidden" onchange="previewImage(this)"></label><button onclick="saveNote()" class="px-5 py-2 rounded-xl text-white" style="background:var(--color-accent)">Сохранить</button></div></div><div id="notes-list" class="flex flex-col gap-3 max-h-96 overflow-auto"></div></section>
        <section id="section-crypto" class="hidden gap-4"><div id="crypto-auth" class="bg-white dark:bg-zinc-900 rounded-2xl p-6 text-center"><input type="password" id="master-password" class="w-full bg-zinc-100 dark:bg-zinc-800 rounded-xl p-3 mb-3" placeholder="Мастер-пароль"><button onclick="unlockVault()" class="w-full bg-cyan-500 py-2 rounded-xl">Открыть сейф</button></div><div id="crypto-content" class="hidden">...</div></section>
        <section id="section-game" class="hidden flex-col gap-4">
            <div class="flex justify-between font-bold"><div>Уровень <span id="game-level">1</span></div><div>Счёт: <span id="game-score">0</span></div></div>
            <div class="game-grid" id="game-board"></div>
            <p class="text-[10px] text-center text-zinc-500">⭐ 4 в ряд → Бомба (3x3)<br>🌀 Квадрат 2x2 → ✈️ Самолёт (случайные 5)<br>❄️ Лёд (2 удара) | 🧱 Стена (3 удара)</p>
        </section>
        <section id="section-settings" class="hidden gap-4"><div class="bg-white dark:bg-zinc-900 rounded-2xl p-4"><button onclick="toggleTheme()" class="px-4 py-2 bg-zinc-200 rounded-xl">Сменить тему</button><div class="flex gap-2 mt-3"><div onclick="setAccentColor('#f43f5e','#e11d48',this)" class="w-8 h-8 rounded-full bg-rose-500"></div><div onclick="setAccentColor('#3b82f6','#2563eb',this)" class="w-8 h-8 rounded-full bg-blue-500"></div><div onclick="setAccentColor('#10b981','#059669',this)" class="w-8 h-8 rounded-full bg-emerald-500"></div></div></div><div class="bg-white dark:bg-zinc-900 rounded-2xl p-4"><button onclick="exportData()" class="w-full py-2 bg-zinc-200 rounded-xl mb-2">Экспорт</button><label class="block w-full py-2 bg-zinc-200 rounded-xl text-center">Импорт<input type="file" class="hidden" onchange="importData(this)"></label></div><a href="https://t.me/cryptolaik" class="bg-zinc-800 p-3 rounded-2xl text-center">📢 Канал разработчика</a></section>
    </main>
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-zinc-900/95 backdrop-blur-xl border-t border-zinc-200 dark:border-zinc-800 z-40 nav-safe"><div class="max-w-md mx-auto flex justify-around"><button onclick="switchTab('notes')" id="nav-notes" class="py-2 text-accent">📝 Заметки</button><button onclick="switchTab('crypto')" id="nav-crypto" class="py-2 text-zinc-400">🔐 Сейф</button><button onclick="switchTab('game')" id="nav-game" class="py-2 text-zinc-400">🎮 Игра</button><button onclick="switchTab('settings')" id="nav-settings" class="py-2 text-zinc-400">⚙️</button></div></nav>
<script>
// ======================== БАЗОВЫЕ МОДУЛИ (ЗАМЕТКИ, СЕЙФ) ========================
let notes = [], currentFilter='all', editingNoteId=null, attachedImageBase64=null, currentMasterKey='', vaultData=null, vaultType='pass';
function loadNotes() { try { notes = JSON.parse(localStorage.getItem('mv_notes')) || []; } catch(e){} renderNotes(); }
function saveNotesToStorage() { localStorage.setItem('mv_notes', JSON.stringify(notes)); }
function renderNotes() { const list = document.getElementById('notes-list'); if(!list) return; list.innerHTML = ''; const filtered = currentFilter==='all'?notes:notes.filter(n=>n.category===currentFilter||(currentFilter.startsWith('#')&&n.text.includes(currentFilter))); filtered.forEach(n=>{ list.innerHTML += `<div class="bg-white dark:bg-zinc-900 rounded-xl p-3"><div>${n.category} <span class="text-xs">${n.date}</span></div>${n.image?`<img src="${n.image}" class="h-24 object-cover rounded my-1" onclick="openPhotoModal('${n.image}')">`:''}<div>${escapeHtml(n.text)}</div><div class="flex gap-2 mt-2"><button onclick="editNote(${n.id})">✏️</button><button onclick="deleteNote(${n.id})">🗑️</button></div></div>`; }); }
function saveNote(){ const txt=document.getElementById('note-input').value; if(!txt&&!attachedImageBase64) return; const cat = (currentFilter==='all'||currentFilter.startsWith('#'))?'💡 Мысли':currentFilter; if(editingNoteId){ notes=notes.map(n=>n.id===editingNoteId?{...n,text:txt,category:cat,image:attachedImageBase64??n.image}:n); cancelEdit(); }else{ notes.unshift({id:Date.now(),text:txt,category:cat,date:new Date().toLocaleDateString(),image:attachedImageBase64}); } saveNotesToStorage(); document.getElementById('note-input').value=''; clearAttachedImage(); renderNotes(); }
function editNote(id){ const n=notes.find(x=>x.id===id); if(n){ editingNoteId=id; document.getElementById('note-input').value=n.text; if(n.image){attachedImageBase64=n.image;document.getElementById('image-preview')&&(document.getElementById('image-preview').src=n.image);} cancelEdit=false; } }
function deleteNote(id){ if(confirm('Удалить?')){ notes=notes.filter(n=>n.id!==id); saveNotesToStorage(); renderNotes(); } }
function cancelEdit(){ editingNoteId=null; document.getElementById('note-input').value=''; clearAttachedImage(); }
function clearAttachedImage(){ attachedImageBase64=null; if(document.getElementById('image-preview-container'))document.getElementById('image-preview-container').classList.add('hidden'); }
function previewImage(input){ const f=input.files[0]; if(f){ const r=new FileReader(); r.onload=e=>{ attachedImageBase64=e.target.result; if(document.getElementById('image-preview')){document.getElementById('image-preview').src=e.target.result; document.getElementById('image-preview-container')?.classList.remove('hidden');} }; r.readAsDataURL(f); } }
function openPhotoModal(src){ const modal=document.getElementById('photo-modal'); document.getElementById('modal-img').src=src; modal.classList.remove('hidden'); modal.classList.add('flex'); }
function closePhotoModal(){ document.getElementById('photo-modal').classList.add('hidden'); }
function filterNotes(cat,btn){ currentFilter=cat; renderNotes(); document.querySelectorAll('.note-tab-btn').forEach(b=>b.classList.remove('tab-active')); if(btn)btn.classList.add('tab-active'); }
function unlockVault(){ const pass=document.getElementById('master-password').value; if(!pass)return; currentMasterKey=CryptoJS.SHA256(pass).toString(); vaultData=localStorage.getItem('mv_vault'); if(vaultData){ try{ CryptoJS.AES.decrypt(vaultData,currentMasterKey).toString(CryptoJS.enc.Utf8); }catch(e){ alert('Неверный пароль'); currentMasterKey=''; return; } }else{ vaultData=CryptoJS.AES.encrypt("[]",currentMasterKey).toString(); localStorage.setItem('mv_vault',vaultData); } alert('Сейф открыт'); }
function exportData(){ const data=JSON.stringify({notes,vault:localStorage.getItem('mv_vault')}); const blob=new Blob([data],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup.json'; a.click(); }
function importData(input){ const f=input.files[0]; if(!f)return; const r=new FileReader(); r.onload=e=>{ const d=JSON.parse(e.target.result); notes=d.notes||[]; if(d.vault)localStorage.setItem('mv_vault',d.vault); saveNotesToStorage(); renderNotes(); alert('Импорт завершён'); }; r.readAsText(f); }
function toggleTheme(){ document.documentElement.classList.toggle('dark'); localStorage.setItem('mv_theme',document.documentElement.classList.contains('dark')?'dark':'light'); }
function setAccentColor(p,h,el){ document.documentElement.style.setProperty('--color-accent',p); document.documentElement.style.setProperty('--color-accent-hover',h); localStorage.setItem('mv_accent',JSON.stringify({primary:p,hover:h})); }
function switchTab(t){ ['notes','crypto','game','settings'].forEach(x=>document.getElementById(`section-${x}`).classList.toggle('hidden',x!==t)); }
function escapeHtml(str){ const div=document.createElement('div'); div.textContent=str; return div.innerHTML; }
document.addEventListener('DOMContentLoaded',()=>{ loadNotes(); if(localStorage.getItem('mv_theme')==='light')document.documentElement.classList.remove('dark'); else document.documentElement.classList.add('dark'); initGame(); });

// ======================== МОЩНАЯ ИГРА С ПРЕДМЕТАМИ, САМОЛЁТИКОМ, ЛЬДОМ И СТЕНАМИ ========================
const W=8;
let board=[], score=0, level=1, selectedCell=null, isBusy=false;
const COLORS=['🔴','🟡','🟢','🔵','🟣'];
const BOMB='💣', PLANE='✈️', ICE='❄️', WALL='🧱';
let planeAnimationTimer=null;

class Cell {
    constructor(type, color=null, hp=1){
        this.type=type; // 'normal', 'bomb', 'plane', 'ice', 'wall'
        this.color=color;
        this.hp=hp; // для льда 2, стены 3
    }
    getDisplay(){
        if(this.type==='bomb') return BOMB;
        if(this.type==='plane') return PLANE;
        if(this.type==='ice') return ICE;
        if(this.type==='wall') return WALL;
        return this.color;
    }
    clone(){ return new Cell(this.type, this.color, this.hp); }
}

function initGame(){
    board=[]; score=0; level=1; updateUI(); selectedCell=null; isBusy=false;
    for(let i=0;i<W*W;i++){
        board.push(new Cell('normal', COLORS[Math.floor(Math.random()*COLORS.length)]));
    }
    while(clearMatchesAndSpawn(false, true)); // очистка стартовых матчей без очков
    renderBoard();
}

function renderBoard(){
    const container=document.getElementById('game-board');
    if(!container) return;
    container.innerHTML='';
    for(let i=0;i<board.length;i++){
        const c=board[i];
        const div=document.createElement('div');
        div.className='candy';
        if(selectedCell===i) div.classList.add('selected');
        if(c.type==='ice') div.classList.add('ice-crack');
        if(c.type==='wall') div.classList.add('wall-crack');
        div.innerHTML=c.getDisplay();
        div.onclick=()=>onCellClick(i);
        container.appendChild(div);
    }
}

function updateUI(){
    document.getElementById('game-score').innerText=score;
    const lvl=Math.floor(score/150)+1;
    if(lvl>level){ level=lvl; showToast(`Уровень ${level}! 🎉 Новые препятствия!`); }
    document.getElementById('game-level').innerText=level;
}

function showToast(msg){
    const t=document.getElementById('toast');
    t.innerText=msg;
    t.classList.remove('hidden','toast-hide');
    t.classList.add('toast-show');
    setTimeout(()=>{ t.classList.replace('toast-show','toast-hide'); setTimeout(()=>t.classList.add('hidden'),300); },2000);
}

async function onCellClick(idx){
    if(isBusy) return;
    const cell=board[idx];
    if(cell.type==='bomb'){ explodeBombArea(idx); return; }
    if(cell.type==='plane'){ activatePlane(idx); return; }
    if(selectedCell===null){
        selectedCell=idx;
        renderBoard();
        return;
    }
    const swapWith=idx;
    const diff=Math.abs(selectedCell-swapWith);
    const sameRow=Math.floor(selectedCell/W)===Math.floor(swapWith/W);
    const sameCol=Math.abs(selectedCell-swapWith)%W===0;
    if((diff===1 && sameRow) || (diff===W && sameCol)){
        await trySwap(selectedCell, swapWith);
    }
    selectedCell=null;
    renderBoard();
}

async function trySwap(a,b){
    if(isBusy) return false;
    isBusy=true;
    const temp=board[a].clone();
    board[a]=board[b].clone();
    board[b]=temp;
    renderBoard();
    await new Promise(r=>setTimeout(r,80));
    const hadMatch=await processAllMatches(true);
    if(!hadMatch){
        const tempBack=board[a].clone();
        board[a]=board[b].clone();
        board[b]=tempBack;
        renderBoard();
    }
    isBusy=false;
    return hadMatch;
}

async function processAllMatches(awardPoints){
    let anyMatch=false;
    while(true){
        const matches=findAllMatches();
        if(matches.size===0) break;
        anyMatch=true;
        const bombSpawnPositions=new Set();
        const planeSpawnPositions=new Set();
        for(let pos of matches){
            const cell=board[pos];
            if(cell.type==='ice' || cell.type==='wall'){
                cell.hp--;
                if(cell.hp<=0){
                    board[pos]=new Cell('normal', COLORS[Math.floor(Math.random()*COLORS.length)]);
                    if(awardPoints) score+=5;
                }else{
                    if(awardPoints) score+=2;
                }
                continue;
            }
            if(cell.type==='normal' && awardPoints) score+=10;
            if(cell.type==='bomb') bombSpawnPositions.add(pos);
            if(cell.type==='plane') planeSpawnPositions.add(pos);
            board[pos]=null;
        }
        for(let p of bombSpawnPositions) board[p]=new Cell('bomb');
        for(let p of planeSpawnPositions) board[p]=new Cell('plane');
        for(let i=0;i<board.length;i++) if(board[i]===null) board[i]=new Cell('normal', COLORS[Math.floor(Math.random()*COLORS.length)]);
        await applyGravityAndAnimate();
        updateUI();
        const extraMatches=findAllMatches();
        if(extraMatches.size>0){
            await processAllMatches(awardPoints);
            return true;
        }
    }
    if(anyMatch) updateUI();
    return anyMatch;
}

function findAllMatches(){
    const matches=new Set();
    for(let r=0;r<W;r++){
        for(let c=0;c<W-2;c++){
            const idx=r*W+c;
            const cell=board[idx];
            if(!cell || cell.type!=='normal') continue;
            let len=1;
            while(c+len<W && board[r*W+c+len]?.type==='normal' && board[r*W+c+len]?.color===cell.color) len++;
            if(len>=3){
                for(let k=0;k<len;k++) matches.add(idx+k);
                if(len>=4){
                    const centerIdx=idx+Math.floor(len/2);
                    const cellC=board[centerIdx];
                    if(cellC?.type==='normal') board[centerIdx]=new Cell('bomb');
                }
            }
            c+=len-1;
        }
    }
    for(let c=0;c<W;c++){
        for(let r=0;r<W-2;r++){
            const idx=r*W+c;
            const cell=board[idx];
            if(!cell || cell.type!=='normal') continue;
            let len=1;
            while(r+len<W && board[(r+len)*W+c]?.type==='normal' && board[(r+len)*W+c]?.color===cell.color) len++;
            if(len>=3){
                for(let k=0;k<len;k++) matches.add(idx+k*W);
                if(len>=4){
                    const centerIdx=idx+Math.floor(len/2)*W;
                    const cellC=board[centerIdx];
                    if(cellC?.type==='normal') board[centerIdx]=new Cell('bomb');
                }
            }
            r+=len-1;
        }
    }
    // L-квадрат 2x2 -> самолёт
    for(let r=0;r<W-1;r++){
        for(let c=0;c<W-1;c++){
            const a=board[r*W+c], b=board[r*W+c+1], c1=board[(r+1)*W+c], d=board[(r+1)*W+c+1];
            if(a?.type==='normal' && b?.type==='normal' && c1?.type==='normal' && d?.type==='normal' && a.color===b.color && a.color===c1.color && a.color===d.color){
                const centerIdx=r*W+c;
                if(board[centerIdx]?.type==='normal') board[centerIdx]=new Cell('plane');
                matches.add(centerIdx); matches.add(centerIdx+1); matches.add(centerIdx+W); matches.add(centerIdx+W+1);
            }
        }
    }
    return matches;
}

async function applyGravityAndAnimate(){
    const container=document.getElementById('game-board');
    for(let c=0;c<W;c++){
        let writeRow=W-1;
        for(let r=W-1;r>=0;r--){
            const idx=r*W+c;
            if(board[idx]!==null){
                if(writeRow!==r){
                    board[writeRow*W+c]=board[idx];
                    board[idx]=null;
                    const targetDiv=container?.children[writeRow*W+c];
                    if(targetDiv) targetDiv.classList.add('fall-animation');
                }
                writeRow--;
            }
        }
        for(let r=writeRow;r>=0;r--){
            const idx=r*W+c;
            const newColor=COLORS[Math.floor(Math.random()*COLORS.length)];
            let extraType='normal';
            if(level>=3 && Math.random()<0.08 && board.every(cell=>cell?.type!=='ice')) extraType='ice';
            else if(level>=6 && Math.random()<0.05 && board.every(cell=>cell?.type!=='wall')) extraType='wall';
            if(extraType==='ice') board[idx]=new Cell('ice', null, 2);
            else if(extraType==='wall') board[idx]=new Cell('wall', null, 3);
            else board[idx]=new Cell('normal', newColor);
            const targetDiv=container?.children[idx];
            if(targetDiv) targetDiv.classList.add('fall-animation');
        }
    }
    await new Promise(r=>setTimeout(r,200));
    renderBoard();
}

async function explodeBombArea(centerIdx){
    if(isBusy) return;
    isBusy=true;
    const r0=Math.floor(centerIdx/W), c0=centerIdx%W;
    const targets=[];
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        const nr=r0+dr, nc=c0+dc;
        if(nr>=0 && nr<W && nc>=0 && nc<W) targets.push(nr*W+nc);
    }
    for(let idx of targets){
        const cell=board[idx];
        if(cell && (cell.type==='ice'||cell.type==='wall')) cell.hp=Math.max(0,cell.hp-1);
        else if(cell && cell.type!=='bomb' && cell.type!=='plane') board[idx]=null;
        if(idx!==centerIdx && board[idx] && (board[idx].type==='bomb'||board[idx].type==='plane')) explodeBombArea(idx);
    }
    board[centerIdx]=null;
    for(let i=0;i<board.length;i++) if(board[i]===null) board[i]=new Cell('normal', COLORS[Math.floor(Math.random()*COLORS.length)]);
    await applyGravityAndAnimate();
    await processAllMatches(true);
    updateUI();
    isBusy=false;
    renderBoard();
}

async function activatePlane(idx){
    if(isBusy) return;
    isBusy=true;
    // Анимация самолётика
    const flyDiv=document.createElement('div');
    flyDiv.className='plane-fly';
    flyDiv.innerHTML='✈️💨';
    document.body.appendChild(flyDiv);
    let startX=0, startY=window.innerHeight/2;
    flyDiv.style.left='0px'; flyDiv.style.top=startY+'px';
    for(let i=0;i<=100;i++){
        flyDiv.style.left=(window.innerWidth*i/100)+'px';
        flyDiv.style.top=startY+Math.sin(i*0.2)*10+'px';
        await new Promise(r=>setTimeout(r,15));
    }
    flyDiv.remove();
    const randomTargets=new Set();
    while(randomTargets.size<5 && randomTargets.size<board.length){
        const rand=Math.floor(Math.random()*board.length);
        if(board[rand] && board[rand].type!=='wall') randomTargets.add(rand);
    }
    for(let t of randomTargets){
        const cell=board[t];
        if(cell && (cell.type==='ice'||cell.type==='wall')) cell.hp=Math.max(0,cell.hp-1);
        else board[t]=null;
        const div=document.getElementById('game-board')?.children[t];
        if(div) div.classList.add('pop-animation');
    }
    await new Promise(r=>setTimeout(r,150));
    for(let t of randomTargets) if(board[t]===null) board[t]=new Cell('normal', COLORS[Math.floor(Math.random()*COLORS.length)]);
    board[idx]=null;
    for(let i=0;i<board.length;i++) if(board[i]===null) board[i]=new Cell('normal', COLORS[Math.floor(Math.random()*COLORS.length)]);
    await applyGravityAndAnimate();
    await processAllMatches(true);
    updateUI();
    isBusy=false;
    renderBoard();
}

function clearMatchesAndSpawn(awardPoints, silent){
    const matches=findAllMatches();
    if(matches.size===0) return false;
    for(let pos of matches){
        if(board[pos] && (board[pos].type==='ice'||board[pos].type==='wall')) board[pos].hp--;
        else board[pos]=null;
    }
    for(let i=0;i<board.length;i++) if(board[i]===null) board[i]=new Cell('normal', COLORS[Math.floor(Math.random()*COLORS.length)]);
    if(!silent) renderBoard();
    return true;
}
</script>
